<div class="view-section creator-container">
    <h2 class="creator-title">Draft a New Story</h2>
    
    <form name="postForm" ng-submit="addPost(postForm.$valid)" novalidate>
        <div class="form-group">
            <label class="form-label" for="title">Title</label>
            <input type="text" id="title" name="title" class="form-control" ng-model="newPost.title" required placeholder="A captivating title...">
        </div>

        <div class="form-group">
            <label class="form-label" for="category">Category</label>
            <select id="category" name="category" class="form-control" ng-model="newPost.category" required>
                <option value="" disabled selected>Select a category...</option>
                <option value="Technology">Technology</option>
                <option value="Design">Design</option>
                <option value="Lifestyle">Lifestyle</option>
                <option value="Development">Development</option>
                <option value="Thoughts">Thoughts</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label" for="coverImage">Cover Image URL (Optional)</label>
            <input type="url" id="coverImage" name="coverImage" class="form-control" ng-model="newPost.coverImage" placeholder="https://example.com/image.jpg">
        </div>

        <div class="form-group">
            <label class="form-label" for="content">Story Content</label>
            <textarea id="content" name="content" class="form-control" ng-model="newPost.content" required placeholder="Once upon a time..."></textarea>
        </div>

        <button type="submit" class="btn-primary" ng-disabled="postForm.$invalid">
            Publish Story
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
        
        <div class="status-message" ng-if="showSuccessMsg">
            Story published successfully!
        </div>
    </form>
</div>
