<div class="view-section">
    <div class="feed-header">
        <h2>Latest Stories</h2>
        <div class="search-container">
            <span class="search-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </span>
            <input type="text" class="search-input" ng-model="searchQuery" placeholder="Search by title, category, or author...">
        </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" ng-if="(posts | filter:searchQuery).length === 0">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem; color: var(--electric-purple);">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        <h3>No stories found</h3>
        <p>Try adjusting your search or write a new story.</p>
        <a ng-href="#!/creator" class="btn-read" style="justify-content: center; margin-top: 1rem;">Start Writing</a>
    </div>

    <!-- Post Grid -->
    <div class="post-grid">
        <div class="card" ng-repeat="post in posts | filter:searchQuery | orderBy:'-date'" ng-click="viewPost(post)">
            <div class="card-img-wrapper">
                <span class="card-category">{{post.category}}</span>
                <img ng-src="{{post.coverImage || 'https://images.unsplash.com/photo-1516382760799-ac8735dfbf86?q=80&w=2609&auto=format&fit=crop'}}" alt="{{post.title}}" class="card-img" onerror="this.src='https://images.unsplash.com/photo-1516382760799-ac8735dfbf86?q=80&w=2600&auto=format&fit=crop'">
            </div>
            <div class="card-body">
                <div class="card-meta">
                    <span>{{post.date | date:'MMM d, yyyy'}}</span>
                    <span>•</span>
                    <span>{{post.authorName}}</span>
                </div>
                <h3 class="card-title">{{post.title}}</h3>
                <p class="card-excerpt">{{post.content | truncate:120}}</p>
                <div class="card-footer" ng-click="$event.stopPropagation()">
                    <a class="btn-read" ng-click="viewPost(post)">Read More</a>
                    <button class="btn-delete" ng-if="isPostOwner(post.authorId)" ng-click="deletePost(post)" title="Delete Post">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
