<div class="view-section auth-container">
    <h2 class="auth-title">Welcome Back</h2>
    
    <form name="loginForm" ng-submit="login()" novalidate>
        <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input type="email" id="email" name="email" class="form-control" ng-model="credentials.email" required placeholder="your@email.com">
        </div>

        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" ng-model="credentials.password" required placeholder="••••••••">
        </div>

        <button type="submit" class="btn-primary" ng-disabled="loginForm.$invalid">
            Log In
        </button>
        
        <div class="error-message" ng-if="errorMessage">
            {{errorMessage}}
        </div>
        
        <div class="auth-links">
            <p>Don't have an account? <a ng-href="#!/register">Sign Up</a></p>
        </div>
    </form>
</div>
