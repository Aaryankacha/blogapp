<div class="view-section auth-container">
    <h2 class="auth-title">Create an Account</h2>
    
    <form name="registerForm" ng-submit="register()" novalidate>
        <div class="form-group">
            <label class="form-label" for="name">Full Name</label>
            <input type="text" id="name" name="name" class="form-control" ng-model="newUser.name" required placeholder="Alex Morgan">
        </div>

        <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input type="email" id="email" name="email" class="form-control" ng-model="newUser.email" required placeholder="alex@example.com">
        </div>

        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" ng-model="newUser.password" required placeholder="••••••••">
        </div>

        <button type="submit" class="btn-primary" ng-disabled="registerForm.$invalid">
            Sign Up
        </button>
        
        <div class="error-message" ng-if="errorMessage">
            {{errorMessage}}
        </div>
        
        <div class="auth-links">
            <p>Already have an account? <a ng-href="#!/login">Log In</a></p>
        </div>
    </form>
</div>
